name: Neon DB keep-alive

on:
  schedule:
    # Every 3 days at 12:00 UTC — light wake for scale-to-zero Postgres
    - cron: "0 12 */3 * *"
  workflow_dispatch:

jobs:
  ping-production:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Ping production database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          import os
          import psycopg2
          url = os.environ['DATABASE_URL']
          conn = psycopg2.connect(url)
          cur = conn.cursor()
          cur.execute('SELECT 1')
          cur.fetchone()
          cur.close()
          conn.close()
          print('DB keep-alive OK (production)')
          "

  ping-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Ping dev database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
        run: |
          python -c "
          import os
          import psycopg2
          url = os.environ['DATABASE_URL']
          conn = psycopg2.connect(url)
          cur = conn.cursor()
          cur.execute('SELECT 1')
          cur.fetchone()
          cur.close()
          conn.close()
          print('DB keep-alive OK (dev)')
          "
