# Free web apps + external Neon Postgres. See docs/DEPLOY_FREE.md and docs/ENVIRONMENTS.md
# Paid Render Postgres + cron import: render-paid.yaml
services:
  # Staging — deploys from develop; set DATABASE_URL to Neon *dev* branch in Dashboard
  - type: web
    name: ygo-app-dev
    runtime: python
    plan: free
    branch: develop
    buildCommand: pip install -r requirements.txt && pip install rjsmin csscompressor && python scripts/minify_static.py && alembic upgrade head
    startCommand: uvicorn ygo_app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: EMAIL_BACKEND
        value: brevo
    healthCheckPath: /api/health

  # Production — deploys from main only; set DATABASE_URL to Neon *production* branch
  - type: web
    name: ygo-app
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt && pip install rjsmin csscompressor && python scripts/minify_static.py && alembic upgrade head
    startCommand: uvicorn ygo_app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: EMAIL_BACKEND
        value: brevo
    healthCheckPath: /api/health
