name: Import YGO catalog (YGOProDeck API fallback)

# Emergency rollback only — primary catalog is import-catalog-yugipedia.yml

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target database
        required: true
        default: production
        type: choice
        options:
          - production
          - dev

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Import cards from YGOProDeck API
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: python -m ygo_app.jobs.import_catalog
