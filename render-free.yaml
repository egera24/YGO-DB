# Alias for the default Blueprint (render.yaml). Kept for docs/backward compatibility.
# Render discovers render.yaml automatically; this file matches it for explicit selection.
services:
  - type: web
    name: ygo-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn ygo_app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/health
