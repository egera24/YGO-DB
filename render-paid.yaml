# Paid/starter all-in-one (Render Postgres + monthly catalog cron).
# For $0 permanent DB use render.yaml + Neon. See docs/DEPLOY_FREE.md
services:
  - type: web
    name: ygo-app
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn ygo_app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ygo-db
          property: connectionString
    healthCheckPath: /api/health

  - type: cron
    name: import-catalog
    runtime: python
    plan: starter
    schedule: "0 3 1 * *"
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python -m ygo_app.jobs.import_catalog
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: ygo-db
          property: connectionString

databases:
  - name: ygo-db
    plan: starter
    databaseName: ygo
    user: ygo
