# Yugipedia catalog: batched scrape (chained jobs) + Neon import.
# BATCH_COUNT must match the number of scrape_batch_* jobs below (currently 6).
name: Import Yugipedia catalog

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target database
        required: true
        default: production
        type: choice
        options:
          - production
          - dev
      skip_scrape:
        description: Import only (requires catalog JSON in workspace or prior artifact)
        required: false
        default: false
        type: boolean
      test_mode:
        description: >-
          Dev test run — scrape/import only card_limit cards (full DB replace).
          Allowed only with environment=dev. Do not use Re-run on old workflow runs.
        required: false
        default: false
        type: boolean
      card_limit:
        description: Max cards when test_mode is true (passcode scrape + import cap)
        required: false
        default: 500
        type: number
      force_image_remirror:
        description: Re-download and re-encode all card images (--force on image mirror job)
        required: false
        default: false
        type: boolean
  schedule:
    # 1st and 15th of each month, 03:00 UTC — production only
    - cron: "0 3 1,15 * *"

env:
  BATCH_COUNT: "6"
  PYTHONUNBUFFERED: "1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Reject test mode on production
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.test_mode == true &&
          inputs.environment == 'production'
        run: |
          echo "::error::test_mode is only allowed with environment=dev (replaces entire catalog with card_limit rows)."
          exit 1

  passcodes:
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape Yugipedia passcode list
        run: |
          ARGS=(--passcodes-only)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_mode }}" == "true" ]]; then
            ARGS+=(--max-cards "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.scrape_yugipedia_catalog "${ARGS[@]}"

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_0:
    needs: passcodes
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 0
        run: |
          BATCH_COUNT="${{ env.BATCH_COUNT }}"
          ARGS=(--details-only --resume --batch-index 0 --batch-count "$BATCH_COUNT")
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_mode }}" == "true" ]]; then
            BATCH_COUNT=1
            ARGS=(--details-only --resume --batch-index 0 --batch-count 1 --max-cards "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.scrape_yugipedia_catalog "${ARGS[@]}"

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_1:
    needs: scrape_batch_0
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 1
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 1 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_2:
    needs: scrape_batch_1
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 2
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 2 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_3:
    needs: scrape_batch_2
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 3
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 3 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_4:
    needs: scrape_batch_3
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 4
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 4 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_5:
    needs: scrape_batch_4
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 5
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 5 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  set_chronology:
    needs:
      - scrape_batch_0
      - scrape_batch_5
    if: |
      always() &&
      needs.scrape_batch_0.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.test_mode == true) ||
        needs.scrape_batch_5.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape Set chronology
        run: python -m ygo_app.jobs.scrape_yugipedia_set_chronology

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
            data/catalog/yugipedia_set_chronology.json
          retention-days: 14
          if-no-files-found: warn

  supplements_batch_0:
    needs: set_chronology
    # always(): required when test_mode skips scrape_batch_1-5 (transitive skip taints the chain).
    if: |
      always() &&
      needs.set_chronology.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape supplements batch 0
        run: |
          BATCH_COUNT="${{ env.BATCH_COUNT }}"
          ARGS=(--resume --batch-index 0 --batch-count "$BATCH_COUNT")
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_mode }}" == "true" ]]; then
            BATCH_COUNT=1
            ARGS=(--resume --batch-index 0 --batch-count 1 --max-cards "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.scrape_yugipedia_supplements "${ARGS[@]}"

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
            data/catalog/yugipedia_set_chronology.json
          retention-days: 14
          if-no-files-found: warn

  supplements_batch_1:
    needs: supplements_batch_0
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog
      - run: |
          python -m ygo_app.jobs.scrape_yugipedia_supplements --resume \
            --batch-index 1 --batch-count ${{ env.BATCH_COUNT }}
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
            data/catalog/yugipedia_set_chronology.json
          retention-days: 14
          if-no-files-found: warn

  supplements_batch_2:
    needs: supplements_batch_1
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog
      - run: |
          python -m ygo_app.jobs.scrape_yugipedia_supplements --resume \
            --batch-index 2 --batch-count ${{ env.BATCH_COUNT }}
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
            data/catalog/yugipedia_set_chronology.json
          retention-days: 14
          if-no-files-found: warn

  supplements_batch_3:
    needs: supplements_batch_2
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog
      - run: |
          python -m ygo_app.jobs.scrape_yugipedia_supplements --resume \
            --batch-index 3 --batch-count ${{ env.BATCH_COUNT }}
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
            data/catalog/yugipedia_set_chronology.json
          retention-days: 14
          if-no-files-found: warn

  supplements_batch_4:
    needs: supplements_batch_3
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog
      - run: |
          python -m ygo_app.jobs.scrape_yugipedia_supplements --resume \
            --batch-index 4 --batch-count ${{ env.BATCH_COUNT }}
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
            data/catalog/yugipedia_set_chronology.json
          retention-days: 14
          if-no-files-found: warn

  supplements_batch_5:
    needs: supplements_batch_4
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog
      - run: |
          python -m ygo_app.jobs.scrape_yugipedia_supplements --resume \
            --batch-index 5 --batch-count ${{ env.BATCH_COUNT }}
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
            data/catalog/yugipedia_set_chronology.json
          retention-days: 14
          if-no-files-found: warn

  images:
    needs:
      - scrape_batch_0
      - scrape_batch_5
      - supplements_batch_0
      - supplements_batch_5
    # always(): runs when test_mode skips batches 1-5. Mirrors card images to the
    # S3-compatible bucket (Cloudflare R2); skips gracefully when secrets are absent.
    # Incremental: re-runs only fetch images missing from the bucket.
    if: |
      always() &&
      needs.scrape_batch_0.result == 'success' &&
      needs.supplements_batch_0.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.test_mode == true) ||
        (needs.scrape_batch_5.result == 'success' && needs.supplements_batch_5.result == 'success')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Check image mirror secrets
        id: mirror
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          if [[ -n "$S3_BUCKET" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::S3_BUCKET secret not set - skipping card image mirror."
          fi

      - name: Mirror card images to bucket
        id: sync
        if: steps.mirror.outputs.enabled == 'true'
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -o pipefail
          mkdir -p data/catalog
          CARD_COUNT="$(jq 'length' data/catalog/yugipedia_all_cards.json)"
          FORCE_REMIRROR="false"
          CARD_LIMIT=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_mode }}" == "true" ]]; then
            CARD_LIMIT="${{ inputs.card_limit }}"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_image_remirror }}" == "true" ]]; then
            FORCE_REMIRROR="true"
          fi
          echo "=== Mirror card images ==="
          echo "Started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Force: ${FORCE_REMIRROR}"
          echo "Card limit: ${CARD_LIMIT:-none}"
          echo "Catalog cards: ${CARD_COUNT}"
          ARGS=(--workers 6)
          if [[ -n "$CARD_LIMIT" ]]; then
            ARGS+=(--limit "$CARD_LIMIT")
          fi
          if [[ "$FORCE_REMIRROR" == "true" ]]; then
            ARGS+=(--force)
          fi
          python -m ygo_app.jobs.sync_card_images "${ARGS[@]}" 2>&1 | tee data/catalog/images_sync.log

      - name: Upload images manifest
        if: steps.mirror.outputs.enabled == 'true' && steps.sync.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: images-manifest
          path: data/catalog/images_manifest.json
          retention-days: 14
          if-no-files-found: warn

      - name: Write job summary
        if: always() && steps.mirror.outputs.enabled == 'true'
        run: |
          {
            echo "## Mirror card images"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| Sync step | ${{ steps.sync.outcome || 'skipped' }} |"
            echo ""
            if [[ -f data/catalog/images_sync.log ]]; then
              echo "### Last log lines"
              echo '```'
              tail -20 data/catalog/images_sync.log
              echo '```'
            else
              echo "_No sync log produced._"
            fi
            if [[ -f data/catalog/images_sync_failures.json ]]; then
              FAIL_COUNT="$(jq 'length' data/catalog/images_sync_failures.json)"
              echo ""
              echo "**Failures:** ${FAIL_COUNT} passcodes — see \`images-sync-log\` artifact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sync log artifact
        if: always() && steps.mirror.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: images-sync-log
          path: |
            data/catalog/images_sync.log
            data/catalog/images_sync_failures.json
          retention-days: 14
          if-no-files-found: ignore

  import:
    needs:
      - prepare
      - scrape_batch_0
      - scrape_batch_5
      - supplements_batch_0
      - supplements_batch_5
      - images
    # always(): required so import runs when test_mode skips scrape_batch_5 (skipped needs skip dependents).
    # images result is intentionally not asserted - import falls back to Yugipedia URLs without a manifest.
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.scrape_batch_0.result == 'success' &&
      needs.supplements_batch_0.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.test_mode == true) ||
        (needs.scrape_batch_5.result == 'success' && needs.supplements_batch_5.result == 'success')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Download images manifest
        if: needs.images.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: images-manifest
          path: data/catalog

      - name: Verify catalog import code (FK fix present)
        run: |
          echo "ref=${{ github.ref }} sha=${{ github.sha }}"
          if grep -q 'session.query(Printing).delete()' ygo_app/import_data.py; then
            echo "::error::Stale import_data.py (Printing.delete). Start a new workflow run from develop/main; do not Re-run old jobs."
            exit 1
          fi
          grep -q '_detach_collection_printing_links' ygo_app/import_data.py

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Import catalog into database
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
          IMAGE_BASE_URL: ${{ secrets.IMAGE_BASE_URL }}
        run: |
          ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_mode }}" == "true" ]]; then
            ARGS+=(--limit "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.import_catalog_yugipedia "${ARGS[@]}"

      - name: Upload scrape artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yugipedia-catalog-${{ github.run_id }}
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
            data/catalog/images_manifest.json
          retention-days: 14
          if-no-files-found: warn

  import_only:
    needs: prepare
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_scrape == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify catalog import code (FK fix present)
        run: |
          echo "ref=${{ github.ref }} sha=${{ github.sha }}"
          if grep -q 'session.query(Printing).delete()' ygo_app/import_data.py; then
            echo "::error::Stale import_data.py (Printing.delete). Start a new workflow run from develop/main; do not Re-run old jobs."
            exit 1
          fi
          grep -q '_detach_collection_printing_links' ygo_app/import_data.py

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ inputs.environment == 'dev' && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Rebuild images manifest from bucket
        continue-on-error: true
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          if [[ -n "$S3_BUCKET" ]]; then
            python -m ygo_app.jobs.sync_card_images --manifest-only
          else
            echo "S3_BUCKET secret not set - import will keep Yugipedia URLs."
          fi

      - name: Import catalog into database
        env:
          DATABASE_URL: ${{ inputs.environment == 'dev' && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
          IMAGE_BASE_URL: ${{ secrets.IMAGE_BASE_URL }}
        run: |
          ARGS=()
          if [[ "${{ inputs.test_mode }}" == "true" ]]; then
            ARGS+=(--limit "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.import_catalog_yugipedia "${ARGS[@]}"

      - name: Upload scrape artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yugipedia-catalog-${{ github.run_id }}
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn
