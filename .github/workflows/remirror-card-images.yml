# Re-encode and re-upload card images (--force) without re-scraping Yugipedia.
# Uses the latest successful catalog-state artifact from Import Yugipedia catalog.
name: Remirror card images

on:
  workflow_dispatch:
    inputs:
      card_limit:
        description: Optional cap on cards processed (testing)
        required: false
        type: number

env:
  PYTHONUNBUFFERED: "1"

jobs:
  remirror:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check image mirror secrets
        id: mirror
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          if [[ -n "$S3_BUCKET" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::error::S3_BUCKET secret not set."
            exit 1
          fi

      - name: Download latest catalog artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=import-catalog-yugipedia.yml \
            --branch=develop \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')"
          if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
            echo "::error::No successful Import Yugipedia catalog run found on develop."
            exit 1
          fi
          echo "Using catalog artifact from run ${RUN_ID}"
          mkdir -p data/catalog
          gh run download "$RUN_ID" --repo "${{ github.repository }}" -n catalog-state -D data/catalog
          test -f data/catalog/yugipedia_all_cards.json
          CARD_COUNT="$(jq 'length' data/catalog/yugipedia_all_cards.json)"
          JSON_BYTES="$(wc -c < data/catalog/yugipedia_all_cards.json | tr -d ' ')"
          echo "Catalog JSON: ${CARD_COUNT} cards, ${JSON_BYTES} bytes"

      - name: Force remirror card images
        id: sync
        if: steps.mirror.outputs.enabled == 'true'
        env:
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -o pipefail
          mkdir -p data/catalog
          CARD_LIMIT="${{ inputs.card_limit }}"
          CARD_COUNT="$(jq 'length' data/catalog/yugipedia_all_cards.json)"
          echo "=== Remirror card images ==="
          echo "Started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Force: true"
          echo "Card limit: ${CARD_LIMIT:-none}"
          echo "Catalog cards: ${CARD_COUNT}"
          ARGS=(--force --workers 6)
          if [[ -n "$CARD_LIMIT" ]]; then
            ARGS+=(--limit "$CARD_LIMIT")
          fi
          python -m ygo_app.jobs.sync_card_images "${ARGS[@]}" 2>&1 | tee data/catalog/images_sync.log

      - name: Upload images manifest
        if: steps.mirror.outputs.enabled == 'true' && steps.sync.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: images-manifest
          path: data/catalog/images_manifest.json
          retention-days: 14
          if-no-files-found: warn

      - name: Write job summary
        if: always() && steps.mirror.outputs.enabled == 'true'
        run: |
          {
            echo "## Remirror card images"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| Started | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo "| Force | true |"
            echo "| Card limit | ${CARD_LIMIT:-none} |"
            echo "| Sync step | ${{ steps.sync.outcome || 'skipped' }} |"
            echo ""
            if [[ -f data/catalog/images_sync.log ]]; then
              echo "### Last log lines"
              echo '```'
              tail -20 data/catalog/images_sync.log
              echo '```'
            else
              echo "_No sync log produced._"
            fi
            if [[ -f data/catalog/images_sync_failures.json ]]; then
              FAIL_COUNT="$(jq 'length' data/catalog/images_sync_failures.json)"
              echo ""
              echo "**Failures:** ${FAIL_COUNT} passcodes — see \`images-sync-log\` artifact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          CARD_LIMIT: ${{ inputs.card_limit }}

      - name: Upload sync log artifact
        if: always() && steps.mirror.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: images-sync-log
          path: |
            data/catalog/images_sync.log
            data/catalog/images_sync_failures.json
          retention-days: 14
          if-no-files-found: ignore
