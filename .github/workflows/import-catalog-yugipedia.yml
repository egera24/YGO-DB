# Yugipedia catalog: batched scrape (chained jobs) + Neon import.
# BATCH_COUNT must match the number of scrape_batch_* jobs below (currently 6).
name: Import Yugipedia catalog

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target database
        required: true
        default: production
        type: choice
        options:
          - production
          - dev
      skip_scrape:
        description: Import only (requires catalog JSON in workspace or prior artifact)
        required: false
        default: false
        type: boolean
      test_mode:
        description: >-
          Dev test run — scrape/import only card_limit cards (full DB replace).
          Allowed only with environment=dev. Do not use Re-run on old workflow runs.
        required: false
        default: false
        type: boolean
      card_limit:
        description: Max cards when test_mode is true (passcode scrape + import cap)
        required: false
        default: 500
        type: number
  schedule:
    # 1st and 15th of each month, 03:00 UTC — production only
    - cron: "0 3 1,15 * *"

env:
  BATCH_COUNT: "6"
  PYTHONUNBUFFERED: "1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Reject test mode on production
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.test_mode == true &&
          inputs.environment == 'production'
        run: |
          echo "::error::test_mode is only allowed with environment=dev (replaces entire catalog with card_limit rows)."
          exit 1

  passcodes:
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape Yugipedia passcode list
        run: |
          ARGS=(--passcodes-only)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_mode }}" == "true" ]]; then
            ARGS+=(--max-cards "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.scrape_yugipedia_catalog "${ARGS[@]}"

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_0:
    needs: passcodes
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 0
        run: |
          BATCH_COUNT="${{ env.BATCH_COUNT }}"
          ARGS=(--details-only --resume --batch-index 0 --batch-count "$BATCH_COUNT")
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_mode }}" == "true" ]]; then
            BATCH_COUNT=1
            ARGS=(--details-only --resume --batch-index 0 --batch-count 1 --max-cards "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.scrape_yugipedia_catalog "${ARGS[@]}"

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_1:
    needs: scrape_batch_0
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 1
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 1 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_2:
    needs: scrape_batch_1
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 2
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 2 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_3:
    needs: scrape_batch_2
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 3
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 3 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_4:
    needs: scrape_batch_3
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 4
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 4 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  scrape_batch_5:
    needs: scrape_batch_4
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (github.event_name != 'workflow_dispatch' || inputs.test_mode != true)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Scrape details batch 5
        run: |
          python -m ygo_app.jobs.scrape_yugipedia_catalog --details-only --resume \
            --batch-index 5 --batch-count ${{ env.BATCH_COUNT }}

      - name: Upload catalog state
        uses: actions/upload-artifact@v4
        with:
          name: catalog-state
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  import:
    needs:
      - prepare
      - scrape_batch_0
      - scrape_batch_5
    # always(): required so import runs when test_mode skips scrape_batch_5 (skipped needs skip dependents)
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.scrape_batch_0.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.test_mode == true) ||
        needs.scrape_batch_5.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download catalog state
        uses: actions/download-artifact@v4
        with:
          name: catalog-state
          path: data/catalog

      - name: Verify catalog import code (FK fix present)
        run: |
          echo "ref=${{ github.ref }} sha=${{ github.sha }}"
          if grep -q 'session.query(Printing).delete()' ygo_app/import_data.py; then
            echo "::error::Stale import_data.py (Printing.delete). Start a new workflow run from develop/main; do not Re-run old jobs."
            exit 1
          fi
          grep -q '_detach_collection_printing_links' ygo_app/import_data.py

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Import catalog into database
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
          ENV: production
        run: |
          ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_mode }}" == "true" ]]; then
            ARGS+=(--limit "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.import_catalog_yugipedia "${ARGS[@]}"

      - name: Upload scrape artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yugipedia-catalog-${{ github.run_id }}
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn

  import_only:
    needs: prepare
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_scrape == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify catalog import code (FK fix present)
        run: |
          echo "ref=${{ github.ref }} sha=${{ github.sha }}"
          if grep -q 'session.query(Printing).delete()' ygo_app/import_data.py; then
            echo "::error::Stale import_data.py (Printing.delete). Start a new workflow run from develop/main; do not Re-run old jobs."
            exit 1
          fi
          grep -q '_detach_collection_printing_links' ygo_app/import_data.py

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ inputs.environment == 'dev' && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Import catalog into database
        env:
          DATABASE_URL: ${{ inputs.environment == 'dev' && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
          ENV: production
        run: |
          ARGS=()
          if [[ "${{ inputs.test_mode }}" == "true" ]]; then
            ARGS+=(--limit "${{ inputs.card_limit }}")
          fi
          python -m ygo_app.jobs.import_catalog_yugipedia "${ARGS[@]}"

      - name: Upload scrape artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yugipedia-catalog-${{ github.run_id }}
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn
