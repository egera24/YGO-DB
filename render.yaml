# Free web app + external Neon Postgres (default Blueprint). See docs/DEPLOY_FREE.md
# Paid Render Postgres + cron import: render-paid.yaml
services:
  - type: web
    name: ygo-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn ygo_app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      # Set in Render Dashboard: Neon pooled DATABASE_URL
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/health
