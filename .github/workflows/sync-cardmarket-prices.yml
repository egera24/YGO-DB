name: Sync Cardmarket prices

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - production
        default: dev
      full_refresh:
        description: Re-discover all printings and refresh every price
        required: false
        type: boolean
        default: false
      test_mode:
        description: Limit to 500 printings (dev only)
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 4 * * 0"

env:
  PYTHONUNBUFFERED: "1"

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve database URL
        id: db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_DEV: ${{ secrets.DATABASE_URL_DEV }}
          ENV_INPUT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          if [[ "$ENV_INPUT" == "production" ]]; then
            echo "url=${DATABASE_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${DATABASE_URL_DEV}" >> "$GITHUB_OUTPUT"
          fi

      - name: Alembic upgrade
        env:
          DATABASE_URL: ${{ steps.db.outputs.url }}
          ENV: production
        run: alembic upgrade head

      - name: Sync Cardmarket prices
        env:
          DATABASE_URL: ${{ steps.db.outputs.url }}
          ENV: production
        run: |
          set -o pipefail
          mkdir -p data/catalog
          ARGS=()
          if [[ "${{ github.event.inputs.full_refresh }}" == "true" ]]; then
            ARGS+=(--full)
          fi
          if [[ "${{ github.event.inputs.test_mode }}" == "true" ]]; then
            if [[ "${{ github.event.inputs.environment || 'dev' }}" == "production" ]]; then
              echo "::error::test_mode is not allowed on production"
              exit 1
            fi
            ARGS+=(--limit 500)
          fi
          echo "=== Sync Cardmarket prices ==="
          echo "Started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Args: ${ARGS[*]:-incremental}"
          python -m ygo_app.jobs.scrape_cardmarket_prices "${ARGS[@]}" 2>&1 | tee data/catalog/cardmarket_prices.log

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cardmarket-prices-log
          path: data/catalog/cardmarket_prices.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Sync Cardmarket prices"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Environment | ${{ github.event.inputs.environment || 'dev' }} |"
            echo "| Full refresh | ${{ github.event.inputs.full_refresh || 'false' }} |"
            echo "| Test mode | ${{ github.event.inputs.test_mode || 'false' }} |"
            if [[ -f data/catalog/cardmarket_prices.log ]]; then
              echo ""
              echo "### Last log lines"
              echo '```'
              tail -20 data/catalog/cardmarket_prices.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
