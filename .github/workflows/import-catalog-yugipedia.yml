name: Import Yugipedia catalog

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target database
        required: true
        default: production
        type: choice
        options:
          - production
          - dev
      skip_scrape:
        description: Import only (use existing scrape JSON in workspace)
        required: false
        default: false
        type: boolean
  schedule:
    # 1st and 15th of each month, 03:00 UTC — production only
    - cron: "0 3 1,15 * *"

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate DATABASE_URL
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
          TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          from sqlalchemy.engine import make_url

          raw = os.getenv("DATABASE_URL", "")
          target = os.getenv("TARGET_ENV", "production")
          stripped = raw.strip()
          url = stripped
          if len(url) >= 2 and url[0] == url[-1] and url[0] in "\"'":
              url = url[1:-1].strip()
          if url.upper().startswith("DATABASE_URL="):
              url = url.split("=", 1)[1].strip()

          diagnostics = {
              "target_env": target,
              "secret_hint": "DATABASE_URL_DEV" if target == "dev" else "DATABASE_URL",
              "raw_len": len(raw),
              "stripped_len": len(stripped),
              "is_whitespace_only": bool(raw and not stripped),
              "has_wrapping_quotes": bool(
                  len(stripped) >= 2
                  and stripped[0] == stripped[-1]
                  and stripped[0] in "\"'"
              ),
              "has_env_prefix": stripped.upper().startswith("DATABASE_URL="),
              "starts_postgresql": stripped.startswith("postgresql"),
              "starts_postgres_scheme": stripped.startswith("postgres:"),
          }
          print("DATABASE_URL diagnostics:", json.dumps(diagnostics))

          log_path = "debug-387ea1.log"
          payload = {
              "sessionId": "387ea1",
              "runId": "gha-validate",
              "hypothesisId": "A-E",
              "location": "workflow:validate_database_url",
              "message": "GHA DATABASE_URL diagnostics",
              "data": diagnostics,
              "timestamp": int(time.time() * 1000),
          }
          with open(log_path, "a", encoding="utf-8") as fh:
              fh.write(json.dumps(payload) + "\n")

          if not url:
              print(
                  f"ERROR: {diagnostics['secret_hint']} is empty or whitespace-only. "
                  "Set the GitHub repository secret to your Neon pooled connection string."
              )
              sys.exit(1)

          try:
              make_url(url)
          except Exception as exc:
              print(f"ERROR: Invalid DATABASE_URL for SQLAlchemy: {exc}")
              print(
                  "Expected format: postgresql://user:pass@ep-xxx-pooler.region.aws.neon.tech/neondb?sslmode=require"
              )
              sys.exit(1)

          print("DATABASE_URL format OK")
          PY

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Scrape Yugipedia catalog
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true }}
        run: python -m ygo_app.jobs.scrape_yugipedia_catalog --full

      - name: Import catalog into database
        env:
          DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
          ENV: production
        run: python -m ygo_app.jobs.import_catalog_yugipedia

      - name: Upload scrape artifacts
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true) }}
        uses: actions/upload-artifact@v4
        with:
          name: yugipedia-catalog-${{ github.run_id }}
          path: |
            data/catalog/yugipedia_passcode_list.json
            data/catalog/yugipedia_all_cards.json
            data/catalog/yugipedia_rejected_cards.json
          retention-days: 14
          if-no-files-found: warn
